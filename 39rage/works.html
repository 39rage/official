<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>39rage - Works</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 共通スタイル */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #f8fafc; color: #0f172a; line-height: 1.6; }
        header { background-color: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 20px; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: #0284c7; text-decoration: none; letter-spacing: 0.05em; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { text-decoration: none; color: #334155; font-weight: 700; font-size: 0.95rem; transition: color 0.2s; }
        nav a:hover { color: #0284c7; }
        .content-section { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .content-section h1 { font-size: 2.2rem; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .work-item { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; transition: transform 0.2s; }
        .work-item:hover { transform: translateY(-4px); }
        .work-info { padding: 20px; }
        .work-info h3 { margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">39rage</a>
            <nav>
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="works.html">WORKS</a></li>
                    <li><a href="request.html">REQUEST</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="content-section">
        <h1>WORKS</h1>
        <div class="grid">
            <div class="work-item">
                <div class="work-info">
                    <h3>作品タイトル</h3>
                    <p>作品の説明や担当した内容が入ります。</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
