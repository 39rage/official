<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Detail - Qurage Music</title>
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/90d8e4fe08331e787970ae1288933823.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-orange: #b46b2d; --soft-white: #ffffff; --bg-light: #f9fafb; --text-main: #1f2937; --text-sub: #6b7280; --header-height: 60px; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Shippori Mincho', 'Inter', serif; background-color: var(--soft-white); color: var(--text-main); overflow-x: hidden; }
        .site-header { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); background: #ffffff; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: center; z-index: 2100; }
        .header-logo { display: inline-block; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.15em; text-decoration: none; color: var(--primary-orange); padding: 10px 20px; }
        .burger-btn { position: absolute; left: 20px; background: none; border: none; cursor: pointer; display: none; padding: 10px; z-index: 2200; }
        .burger-line { display: block; width: 22px; height: 1px; background: var(--primary-orange); margin: 6px 0; transition: 0.3s; }
        .burger-btn.open .burger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .burger-btn.open .burger-line:nth-child(2) { opacity: 0; }
        .burger-btn.open .burger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        .main-container { display: grid; grid-template-columns: 25% 75%; min-height: 100vh; padding-top: var(--header-height); }
        .col-left { background: var(--primary-orange); color: #ffffff; position: sticky; top: var(--header-height); height: calc(100vh - var(--header-height)); display: flex; flex-direction: column; overflow: hidden; padding-top: 50px; z-index: 1000; }
        .hero-img-wrapper { width: 100%; height: 28vh; display: flex; justify-content: center; align-items: center; }
        .hero-img-left { width: auto; max-height: 100%; max-width: 85%; object-fit: contain; }
        .profile-text-area { padding: 20px 20px 10px; text-align: center; }
        .profile-text-area h1 { font-size: 1.3rem; font-weight: 400; letter-spacing: 0.15em; margin-bottom: 2px; }
        .profile-text-area p { font-size: 0.7rem; opacity: 0.8; margin-bottom: 4px; font-weight: 600; }
        .illust-credit { font-size: 0.6rem; opacity: 0.6; margin-bottom: 20px; }
        .recent-tracks-section { padding: 0 10% 20px 15%; flex: 1; overflow: hidden; }
        .recent-tracks-section h3 { font-size: 0.7rem; letter-spacing: 0.15em; color: rgba(255,255,255,0.7); border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; margin-bottom: 15px; }
        .recent-grid { display: flex; flex-wrap: wrap; flex-direction: column; height: 240px; gap: 8px; }
        .recent-link { width: calc(50% - 4px); display: flex; align-items: center; color: #ffffff; text-decoration: none; font-size: 0.65rem; padding: 6px 8px; border: 1px solid rgba(255,255,255,0.4); border-radius: 2px; transition: all 0.3s ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .recent-link:hover { background: #ffffff; color: var(--primary-orange); border-color: #ffffff; transform: translateX(3px); }
        .content-area { display: flex; flex-direction: column; background: var(--soft-white); }
        .columns-split { display: grid; grid-template-columns: 65% 35%; flex: 1; }
        .col-mid { padding: 60px 50px 0; border-right: 1px solid #f3f4f6; display: flex; flex-direction: column; }
        .mid-container { max-width: 800px; margin: 0 auto; width: 100%; flex: 1; }
        .album-detail-box { text-align: center; }
        .album-art-large { width: 100%; max-width: 320px; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); margin-bottom: 40px; }
        .album-title-main { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; color: var(--text-main); }
        .album-subtitle { color: var(--primary-orange); font-weight: bold; margin-bottom: 25px; font-size: 1rem; letter-spacing: 0.1em; }
        .album-description { font-size: 1rem; line-height: 2.2; color: var(--text-sub); max-width: 600px; margin: 0 auto; }
        .col-right { height: calc(100vh - var(--header-height)); position: sticky; top: var(--header-height); padding: 60px 30px 30px; background: var(--bg-light); display: flex; flex-direction: column; }
        .section-title { font-size: 0.8rem; letter-spacing: 0.15em; margin-bottom: 25px; border-left: 3px solid var(--primary-orange); padding-left: 15px; font-weight: 700; }
        .track-list { list-style: none; margin-bottom: 30px; flex: 1; overflow-y: auto; padding-right: 5px; }
        .track-list::-webkit-scrollbar { width: 4px; }
        .track-list::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
        .track-item { padding: 15px 12px; border-bottom: 1px solid #e5e7eb; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; transition: 0.2s; background: transparent; }
        .track-item:hover { background: rgba(255,255,255,0.5); }
        .track-item.active { background: #fff; color: var(--primary-orange); font-weight: bold; }
        .track-meta { font-family: 'Inter'; font-size: 0.65rem; color: var(--text-sub); }
        .player-footer { margin-top: auto; }
        .player-ui { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 25px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .now-playing-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 20px; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }
        .controls-group { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .btn-svg { background: none; border: none; cursor: pointer; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.2s; }
        .btn-svg:hover { background: #f3f4f6; }
        .btn-svg.active .icon-svg { fill: var(--primary-orange); }
        #repeatBtn { position: relative; }
        #repeatBtn.repeat-one::after { content: '1'; position: absolute; top: 8px; right: 8px; font-size: 10px; font-weight: bold; color: var(--primary-orange); background: #fff; border: 1px solid var(--primary-orange); border-radius: 50%; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .icon-svg { fill: #9ca3af; width: 22px; height: 22px; transition: fill 0.2s; }
        .play-main { width: 55px; height: 55px; border-radius: 50%; background: #fff; border: 1px solid var(--primary-orange); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .play-main:hover { transform: scale(1.05); background: var(--primary-orange); }
        .play-main:hover .icon-svg { fill: #fff; }
        .play-main .icon-svg { fill: var(--primary-orange); width: 26px; height: 26px; }
        .timeline-box { width: 100%; display: flex; align-items: center; gap: 12px; font-size: 0.7rem; color: var(--text-sub); font-family: 'Inter'; }
        .seek-bar { flex: 1; height: 4px; accent-color: var(--primary-orange); cursor: pointer; }
        .volume-box { width: 100%; display: flex; align-items: center; gap: 10px; margin-top: 20px; padding-top: 15px; border-top: 1px solid #f3f4f6; }
        #volumeBar { height: 4px; accent-color: #9ca3af; flex: 1; cursor: pointer; }
        .download-btn-wrapper { margin-top: 25px; }
        .booth-btn { display: block; background: var(--primary-orange); color: #fff; text-decoration: none; font-weight: 700; padding: 15px; text-align: center; border-radius: 8px; transition: 0.3s; font-size: 0.9rem; letter-spacing: 0.05em; font-family: 'Shippori Mincho', serif; }
        .booth-btn:hover { background: #965925; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(180, 107, 45, 0.2); }
        
        footer { text-align: center; padding: 40px 0; color: var(--text-sub); font-size: 0.8rem; border-top: 1px solid #f3f4f6; background: #ffffff; }
        .footer-pc { display: block; width: 100%; margin-top: auto; }
        .footer-mobile { display: none; }

        @media (max-width: 900px) { 
            .main-container { display: block; } .burger-btn { display: block; } .col-left { position: fixed; left: 0; top: -100%; width: 100%; height: 100vh; z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; visibility: hidden; padding-top: calc(var(--header-height) + 50px); overflow-y: auto; } .col-left.open { top: 0; opacity: 1; visibility: visible; } .columns-split { display: block; } .col-mid, .col-right { padding: 40px 20px; border-right: none; height: auto; position: static; } .track-list { max-height: 400px; } 
            .footer-pc { display: none; } .footer-mobile { display: block; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <button class="burger-btn" id="burgerBtn"><span class="burger-line"></span><span class="burger-line"></span><span class="burger-line"></span></button>
        <a href="index.html" class="header-logo">Qurage Music</a>
    </header>
    <div class="main-container">
        <aside class="col-left" id="sidebar">
            <div class="hero-img-wrapper"><img src="https://fromtheasia.com/wp-content/uploads/NCG292.jpg" alt="Qurage" class="hero-img-left"></div>
            <div class="profile-text-area"><h1>Qurage</h1><p>Free BGM & Track Maker</p><div class="illust-credit">Illustration : ノーコピーライトガール</div></div>
            <div class="recent-tracks-section">
                <h3>DISCOGRAPHY</h3>
                <div class="recent-grid" id="sidebarNav"></div>
            </div>
        </aside>
        <div class="content-area">
            <div class="columns-split">
                <article class="col-mid">
                    <div class="mid-container" id="albumDetail"></div>
                    <footer class="footer-pc">© Qurage. All Rights Reserved.</footer>
                </article>
                <section class="col-right">
                    <h2 class="section-title">TRACK LIST</h2>
                    <ul class="track-list" id="trackList"></ul>
                    <div class="player-footer">
                        <div class="player-ui">
                            <div class="now-playing-title" id="nowPlaying">...</div>
                            <div class="controls-group">
                                <button class="btn-svg" id="shuffleBtn" title="Shuffle"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.45 20 9.5V4h-5.5zm.59 10.83l-1.41 1.41 3.13 3.13L14.5 22H20v-5.5l-2.04 2.04-3.37-3.37z"/></svg></button>
                                <button class="btn-svg" id="prevBtn" title="Previous"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                                <button class="play-main" id="playBtn" title="Play/Pause"><svg id="playIconSVG" class="icon-svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
                                <button class="btn-svg" id="nextBtn" title="Next"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                                <button class="btn-svg" id="repeatBtn" title="Repeat"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
                            </div>
                            <div class="timeline-box">
                                <span id="currentTime">0:00</span>
                                <input type="range" class="seek-bar" id="seekBar" value="0" max="100">
                                <span id="duration">0:00</span>
                            </div>
                            <div class="volume-box">
                                <button class="btn-svg" id="muteBtn" style="width:24px; height:24px;"><svg id="volumeIcon" class="icon-svg" style="width:18px; height:18px;" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
                                <input type="range" id="volumeBar" value="80" max="100">
                            </div>
                        </div>
                        <div class="download-btn-wrapper" id="downloadArea"></div>
                    </div>
                </section>
            </div>
            <footer class="footer-mobile">© Qurage. All Rights Reserved.</footer>
        </div>
    </div>
    <script src="music-data.js"></script>
    <script>
        const currentAlbumId = "mystic-moon";
        const sidebarNav = document.getElementById('sidebarNav');
        sidebarNav.innerHTML = allAlbums.map(album => `<a href="${album.id}.html" class="recent-link">${album.title}</a>`).join('');
        const album = allAlbums.find(a => a.id === currentAlbumId);
        if(album) {
            document.title = `${album.title} - Qurage Music`;
            document.getElementById('albumDetail').innerHTML = `<div class="album-detail-box"><img src="${album.img}" alt="${album.title}" class="album-art-large"><h2 class="album-title-main">${album.title}</h2><p class="album-subtitle">${album.subtitle}</p><p class="album-description">${album.desc}</p></div>`;
            document.getElementById('downloadArea').innerHTML = `<a href="${album.booth}" target="_blank" class="booth-btn">Download at BOOTH</a>`;
        }
        const albumTracks = allTracks.filter(t => t.albumId === currentAlbumId).sort((a, b) => a.file.localeCompare(b.file));
        const trackListContainer = document.getElementById('trackList');
        trackListContainer.innerHTML = albumTracks.map((track, idx) => `<li class="track-item" data-src="audio/${track.file}"><span>${String(idx + 1).padStart(2, '0')}. ${track.title}</span><span class="track-meta">Preview</span></li>`).join('');
        const audio = new Audio();
        const playBtn = document.getElementById('playBtn');
        const playIconSVG = document.getElementById('playIconSVG');
        const nowPlaying = document.getElementById('nowPlaying');
        const seekBar = document.getElementById('seekBar');
        const currentTimeText = document.getElementById('currentTime');
        const durationText = document.getElementById('duration');
        const volumeBar = document.getElementById('volumeBar');
        const muteBtn = document.getElementById('muteBtn');
        const volumeIcon = document.getElementById('volumeIcon');
        let trackItems; let currentIndex = 0; let isShuffle = false; let repeatMode = 0; let lastVolume = 0.8;
        const playPath = "M8 5v14l11-7z"; const pausePath = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";
        function updatePlayIcon(isPlaying) { playIconSVG.querySelector('path').setAttribute('d', isPlaying ? pausePath : playPath); }
        function loadTrack(index) {
            trackItems = Array.from(document.querySelectorAll('.track-item'));
            if(!trackItems[index]) return;
            trackItems.forEach(i => i.classList.remove('active'));
            trackItems[index].classList.add('active');
            currentIndex = index;
            nowPlaying.textContent = trackItems[index].querySelector('span').textContent;
            audio.src = trackItems[index].getAttribute('data-src');
        }
        loadTrack(0);
        playBtn.addEventListener('click', () => { if (audio.paused) { audio.play().catch(e => console.log(e)); updatePlayIcon(true); } else { audio.pause(); updatePlayIcon(false); } });
        document.getElementById('prevBtn').addEventListener('click', () => { let idx = (currentIndex - 1 + trackItems.length) % trackItems.length; loadTrack(idx); audio.play(); updatePlayIcon(true); });
        const playNext = () => { let idx = isShuffle ? Math.floor(Math.random() * trackItems.length) : (currentIndex + 1) % trackItems.length; loadTrack(idx); audio.play(); updatePlayIcon(true); };
        document.getElementById('nextBtn').addEventListener('click', playNext);
        document.getElementById('shuffleBtn').addEventListener('click', function() { isShuffle = !isShuffle; this.classList.toggle('active', isShuffle); });
        document.getElementById('repeatBtn').addEventListener('click', function() {
            repeatMode = (repeatMode + 1) % 3;
            this.classList.remove('active', 'repeat-one');
            if (repeatMode === 1) this.classList.add('active', 'repeat-one');
            else if (repeatMode === 2) this.classList.add('active');
        });
        document.getElementById('trackList').addEventListener('click', (e) => {
            const item = e.target.closest('.track-item');
            if (item) { const idx = trackItems.indexOf(item); loadTrack(idx); audio.play(); updatePlayIcon(true); }
        });
        audio.addEventListener('timeupdate', () => { if (!isNaN(audio.duration)) { seekBar.value = (audio.currentTime / audio.duration) * 100; let m = Math.floor(audio.currentTime / 60), s = Math.floor(audio.currentTime % 60); currentTimeText.textContent = `${m}:${s < 10 ? '0'+s : s}`; } });
        audio.addEventListener('loadedmetadata', () => { let m = Math.floor(audio.duration / 60), s = Math.floor(audio.duration % 60); durationText.textContent = `${m}:${s < 10 ? '0'+s : s}`; });
        seekBar.addEventListener('input', () => audio.currentTime = (seekBar.value / 100) * audio.duration);
        audio.addEventListener('ended', () => { if (repeatMode === 1) audio.play(); else playNext(); });
        volumeBar.addEventListener('input', () => { const val = volumeBar.value / 100; audio.volume = val; if (val > 0) lastVolume = val; updateVolumeIcon(val); });
        muteBtn.addEventListener('click', () => { if (audio.volume > 0) { lastVolume = audio.volume; audio.volume = 0; volumeBar.value = 0; } else { audio.volume = lastVolume; volumeBar.value = lastVolume * 100; } updateVolumeIcon(audio.volume); });
        function updateVolumeIcon(vol) { const path = volumeIcon.querySelector('path'); if (vol === 0) path.setAttribute('d', 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z'); else if (vol < 0.5) path.setAttribute('d', 'M7 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z'); else path.setAttribute('d', 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z'); }
        const burgerBtn = document.getElementById('burgerBtn');
        const sidebar = document.getElementById('sidebar');
        burgerBtn.addEventListener('click', () => { burgerBtn.classList.toggle('open'); sidebar.classList.toggle('open'); document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : 'auto'; });
    </script>
</body>
</html>
