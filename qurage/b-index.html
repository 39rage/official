<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👾 MUSIC - Qurage</title>
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/90d8e4fe08331e787970ae1288933823.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="b-style.css">
</head>
<body>

    <nav class="app-nav">
        <div class="nav-content">
            <div class="app-logo">👾 MUSIC</div>
            <div class="nav-links">
                <a href="index.html">PATTERN A</a>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <!-- ヒーローヘッダー -->
        <header class="artist-header">
            <div class="artist-banner">
                <img src="https://fromtheasia.com/wp-content/uploads/NCG292.jpg" alt="Qurage" class="banner-img">
                <div class="artist-info-overlay">
                    <p class="category-label">アーティスト</p>
                    <h1 class="artist-name">Qurage</h1>
                    <div class="artist-actions">
                        <button class="play-btn-main" onclick="playAll()">再生</button>
                        <button class="shuffle-btn-main" onclick="shuffleAll()">シャッフル</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="app-main">
            <!-- ディスコグラフィ セクション -->
            <section class="app-section">
                <div class="section-header">
                    <h2>アルバム</h2>
                </div>
                <div class="album-grid" id="albumGrid">
                    <!-- music-data.js から自動生成 -->
                </div>
            </section>

            <!-- ソング（全曲）セクション -->
            <section class="app-section">
                <div class="section-header">
                    <h2>トップソング</h2>
                </div>
                <div class="song-list" id="songList">
                    <!-- music-data.js から自動生成 -->
                </div>
            </section>

            <!-- UNRELEASED セクション -->
            <section class="app-section unreleased-section">
                <div class="section-header">
                    <h2>UNRELEASED</h2>
                    <p class="section-note">制作途中・未配布の楽曲です。よければお聞きください。</p>
                </div>
                <div class="song-list" id="unreleasedList">
                    <!-- music-data.js から自動生成 -->
                </div>
            </section>
        </main>

        <footer class="app-footer">
            © Qurage. All Rights Reserved.
        </footer>
    </div>

    <!-- フッター固定プレイヤー -->
    <div class="fixed-player">
        <div class="player-inner">
            <div class="now-playing-info">
                <img src="" alt="" id="miniJacket" class="mini-jacket">
                <div class="track-details">
                    <div id="playerTitle" class="player-track-name">曲を選択してください</div>
                    <div id="playerArtist" class="player-artist-name">Qurage</div>
                </div>
            </div>
            <div class="player-controls">
                <button class="ctrl-btn" id="prevBtn">⏮</button>
                <button class="play-main-btn" id="playBtn">▶</button>
                <button class="ctrl-btn" id="nextBtn">⏭</button>
            </div>
            <div class="player-progress-container">
                <span id="currentTime">0:00</span>
                <input type="range" id="seekBar" value="0" max="100" class="app-seek">
                <span id="duration">0:00</span>
            </div>
        </div>
    </div>

    <script src="music-data.js"></script>
    <script src="b-logic.js"></script>
    <script>
        initAppPage();
    </script>
</body>
</html>
