<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qurage Music - SELECT MUSIC (B)</title>
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/90d8e4fe08331e787970ae1288933823.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Shippori+Mincho:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <!-- Aの基本設定を一部拝借 -->
    <link rel="stylesheet" href="b-style.css">
</head>
<body class="bright-theme">
    <div id="header-part"></div>

    <main class="game-container">
        <!-- 左：カテゴリー -->
        <aside class="category-selector" id="sidebar-part">
            <!-- shared-components.js の内容をB用に一部隠して表示します -->
        </aside>

        <!-- 中：縦スクロール選曲エリア -->
        <section class="music-selection">
            <div class="scroll-area" id="albumScrollArea">
                <div class="infinite-scroll-wrapper" id="albumList">
                    <!-- ジャケ写リストが自動生成されます -->
                </div>
            </div>
            
            <div class="album-info-panel" id="albumDetail">
                <!-- ここにタイトル・説明・BOOTHボタンが並びます -->
            </div>
        </section>

        <!-- 右：プレイヤー ＆ 曲リスト（Aの形を完全維持） -->
        <section class="col-right" id="player-part">
        </section>
    </main>

    <footer class="game-footer">
        © Qurage. All Rights Reserved.
    </footer>

    <script src="music-data.js"></script>
    <script src="shared-components.js"></script>
    <script src="b-logic.js"></script>
    <script>
        initGamePage();
    </script>
</body>
</html>
