<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qurage Music - Free BGM & Track Maker</title>
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/90d8e4fe08331e787970ae1288933823.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* UNRELEASED 専用スタイル */
        .unreleased-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .unreleased-link-item { 
            display: flex; justify-content: space-between; align-items: center;
            text-decoration: none; padding: 15px 20px; background: #fff;
            border: 1px solid #f3f4f6; border-radius: 8px; transition: 0.3s;
        }
        .unreleased-link-item:hover { transform: translateX(5px); border-color: var(--primary-orange); }
        .un-title { font-size: 0.95rem; font-weight: 700; color: var(--text-main); }
        .un-meta { font-size: 0.75rem; color: var(--text-sub); font-family: 'Inter'; }
        
        /* 注意書きのスタイル */
        .unreleased-note { font-size: 0.8rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 20px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="header-part"></div>
    <div class="main-container">
        <aside class="col-left" id="sidebar-part"></aside>
        <div class="content-area">
            <div class="columns-split">
                <article class="col-mid">
                    <div class="mid-container">
                        <section class="section-box">
                            <h2>ABOUT</h2>
                            <div class="about-text">
                                Qurageが制作したフリーBGMの試聴ポータルです。<br>
                                動画制作や配信など、あなたのクリエイティブにお役立てください。<br>
                                心地よく、少しだけ日常を彩るような音を目指しています。
                            </div>
                        </section>
                        
                        <section class="section-box">
                            <h2>DISCOGRAPHY</h2>
                            <div class="album-grid" id="albumGrid"></div>
                        </section>

                        <section class="section-box">
                            <h2>UNRELEASED</h2>
                            <!-- 注意書きの追加 -->
                            <p class="unreleased-note">これはフリーBGMではありません。制作途中・未配布の楽曲です。よければお聞きください。</p>
                            <div class="unreleased-list" id="unreleasedList"></div>
                        </section>

                    </div>
                    <footer class="footer-pc">© Qurage. All Rights Reserved.</footer>
                </article>
                <section class="col-right" id="player-part"></section>
            </div>
            <footer class="footer-mobile">© Qurage. All Rights Reserved.</footer>
        </div>
    </div>
    <script src="music-data.js"></script>
    <script src="shared-components.js"></script>
    <script>initIndexPage();</script>
</body>
</html>
