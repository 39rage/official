            min-height: 100vh;
        }

        .site-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        /* 左半分：共通ヘッダー（固定パネル） */
        .left-panel {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .hero-image {
            width: 100%;
            height: 70vh;
            object-fit: cover;
            object-position: top;
        }

        .title-box {

            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .title-box h1 {
            font-size: 2.6rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .title-box p {
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .illust-credit {

            color: rgba(255, 255, 255, 0.75);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 8px;
        }

        /* 右半分：スクロールコンテンツ */
        .right-panel {
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            min-height: 100vh;
        }

        .container {
            flex: 1;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 40px;
            text-decoration: none;
            color: #b46b2d;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.3s;
        }
        .back-link:hover { opacity: 0.7; }

        .album-detail {
            margin-bottom: 60px;
            text-align: center;

        }
