<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qurage Music - Portfolio</title>
    <style>
        :root {
            --primary-orange: #ff6b35;
            --soft-white: #fafafa;
            --text-dark: #2b2d42;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--soft-white);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* 左側：固定ヘッダー（サイトロゴと紹介） */
        header {
            width: 40%;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid #eee;
            padding: 40px;
            box-sizing: border-box;
        }

        .header-logo {
            font-size: 4rem;
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -3px;
        }

        .header-logo span {
            color: var(--primary-orange);
        }

        /* 右側：アルバム一覧 */
        main {
            margin-left: 40%;
            width: 60%;
            padding: 100px 80px;
            box-sizing: border-box;
        }

        .album-card {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
            margin-bottom: 40px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .album-card:hover {
            transform: translateX(10px);
        }

        .album-card img {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            margin-right: 30px;
            object-fit: cover;
        }

        .album-info h2 {
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        .album-info p {
            color: var(--primary-orange);
            font-weight: bold;
            margin: 5px 0 0 0;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            header { width: 100%; height: auto; position: relative; padding: 60px 20px; }
            main { width: 100%; margin-left: 0; padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">
            QURAGE<br><span>MUSIC</span>
        </div>
        <p style="margin-top: 20px; font-weight: bold; letter-spacing: 2px;">SOUND ARCHIVE</p>
    </header>

    <main>
        <a href="first-step.html" class="album-card">
            <img src="https://fromtheasia.com/wp-content/uploads/NCG63.jpg" alt="First step">
            <div class="album-info">
                <h2>First Step</h2>
                <p>VIEW TRACKS →</p>
            </div>
        </a>
        
        </main>

</body>
</html>
