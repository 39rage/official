<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>39Rage - Portfolio</title>
    <!-- お洒落なフォントの読み込み -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 全体のデザイン設定 */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d; /* Carrdに近い暗い背景 */
            color: #ffffff;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 60px 0;
            text-align: center;
        }

        /* プロフィール画像 */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid #333;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }

        p.description {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }

        /* リンクボタン */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: block;
            padding: 15px;
            background-color: #1a1a1a;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background-color: #ffffff;
            color: #000;
        }

        /* 将来用のメディアセクション */
        .media-section {
            margin-top: 50px;
            padding-top: 50px;
            border-top: 1px solid #222;
        }

        video, audio {
            width: 100%;
            margin-top: 20px;
            border-radius: 8px;
        }

        .footer {
            margin-top: auto;
            padding: 40px 0;
            font-size: 0.7rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- プロフィール画像（ファイルをアップしたら差し替え） -->
        <img src="https://via.placeholder.com/150" alt="39Rage" class="profile-img">
        
        <h1>39Rage</h1>
        <p class="description">Creating something special.</p>

        <div class="links">
            <a href="#" class="link-btn">X (Twitter)</a>
            <a href="#" class="link-btn">Instagram</a>
            <a href="#" class="link-btn">YouTube</a>
        </div>

        <!-- 将来的に動画や音声を載せる場所 -->
        <div class="media-section">
            <h3>Future Content</h3>
            <p style="font-size: 0.8rem; color: #666;">動画や音声はここに埋め込めます</p>
            
            <!-- 動画の例（コメントアウトを外すと動きます）
            <video controls>
                <source src="your-video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video> 
            -->

            <!-- 音声の例（コメントアウトを外すと動きます）
            <audio controls>
                <source src="your-audio.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio> 
            -->
        </div>
    </div>

    <div class="footer">
        © 39Rage. Built with AI & GitHub.
    </div>

</body>
</html>
