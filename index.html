<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Page</title>
    <!-- 総合トップ専用 ファビコン設定 -->
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/6410224d7e21cc6e2a9eb0cf659e7eb4.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #050b14;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* タイトルエリア */
        .title-area {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #050b14, transparent);
            position: absolute;
            top: 0; left: 0; width: 100%;
            z-index: 10;
        }
        .title-area h1 {
            color: #ffffff;
            font-size: 1.8rem;
            letter-spacing: 0.2em;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .title-area p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 5px;
            letter-spacing: 0.1em;
        }

        /* セレクトコンテナ（3分割） */
        .select-container {
            flex: 1;
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 各名義の共通スタイル */
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            position: relative;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
            padding: 20px;
            background-size: cover !important;
            background-position: center !important;
        }

        /* ホバーしたパネルを広げる */
        .panel:hover {
            flex: 1.6;
        }

        /* 背景のオーバーレイ */
        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(5, 11, 20, 0.65);
            transition: background 0.4s ease;
            z-index: 1;
        }
        .panel:hover::before {
            background: rgba(5, 11, 20, 0.25);
        }

        .panel-content {
            position: relative;
            z-index: 2;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .panel:hover .panel-content {
            transform: scale(1.1);
        }

        /* 文字色はすべて白に統一 */
        .name {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5);
        }
        .desc {
            font-size: 0.95rem;
            color: #f1f5f9;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            font-weight: bold;
        }

        /* ーーー 各パネルの個別背景＆境界線設定 ーーー */

        /* 1. Qurage （左） */
        .panel.qurage {
            background: url('https://fromtheasia.com/wp-content/uploads/NCG292.jpg') no-repeat;
        }

        /* 2. 39rage （中央） */
        .panel.sakurage {
            background: url('https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png') no-repeat;
            border-left: 1px solid rgba(255,255,255,0.15);
            border-right: 1px solid rgba(255,255,255,0.15);
        }

        /* 3. Sacra （右） */
        .panel.sakura {
            background: url('https://fromtheasia.com/wp-content/uploads/NCG144.jpg') no-repeat;
        }

        /* スマホ対応 */
        @media (max-width: 768px) {
            body { overflow: auto; height: auto; }
            .title-area { position: relative; padding: 40px 20px 20px 20px; }
            .select-container { flex-direction: column; height: 750px; }
            .panel { border: none !important; }
            .panel:hover { flex: 1; }
            .name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="title-area">
        <h1>Please choose a page</h1>
        <p>ページを選択してください</p>
    </div>

    <div class="select-container">
        
        <!-- ① Qurage（左） -->
        <a href="https://casbgcasbg.booth.pm/" class="panel qurage" target="_blank" rel="noopener noreferrer">
            <div class="panel-content">
                <div class="name">Qurage</div>
                <div class="desc">Free BGM ↗</div>
            </div>
        </a>

        <!-- ② 39rage（中央） -->
        <a href="39rage/index.html" class="panel sakurage" target="_blank" rel="noopener noreferrer">
            <div class="panel-content">
                <div class="name">39rage</div>
                <div class="desc">MIX＆Video Edit ↗</div>
            </div>
        </a>

        <!-- ③ Sacra（右） -->
        <a href="https://3939-sacra.carrd.co/" class="panel sakura" target="_blank" rel="noopener noreferrer">
            <div class="panel-content">
                <div class="name">Sacra</div>
                <div class="desc">Vocalist ↗</div>
            </div>
        </a>

    </div>

</body>
</html>
