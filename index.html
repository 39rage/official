<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>39rage - Portal</title>
    <!-- ファビコン設定 -->
    <link rel="icon" href="https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #e0f2fe; color: #0f172a;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .container {
            width: 90%; max-width: 900px; margin: 0 auto;
            padding: 40px 0; text-align: center;
        }

        h1 {
            font-size: 2.2rem; margin-bottom: 50px; letter-spacing: 0.1em; font-weight: 700;
        }

        /* 3択の選択肢を横並びにするコンテナ */
        .portal-grid {
            display: flex; justify-content: center; align-items: flex-start;
            gap: 40px; flex-wrap: wrap; margin-bottom: 50px;
        }

        /* 選択肢それぞれのカードスタイル */
        .portal-card {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: #0f172a; width: 220px;
            transition: transform 0.25s ease, opacity 0.2s;
        }

        /* アイコン画像のスタイル（正円・影・枠線） */
        .portal-avatar {
            width: 150px; height: 150px; border-radius: 50%;
            object-fit: cover; background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(15, 23, 42, 0.1);
            border: 4px solid #ffffff; transition: box-shadow 0.25s ease;
        }

        /* 名義のテキストスタイル */
        .portal-name {
            margin-top: 18px; font-size: 1.2rem; font-weight: 700;
            letter-spacing: 0.05em;
        }

        /* 各名義の簡単な説明（世界観の補足） */
        .portal-desc {
            margin-top: 6px; font-size: 0.8rem; color: #64748b;
            line-height: 1.4;
        }

        /* ホバー時の演出（少し浮き上がって影を強く） */
        .portal-card:hover {
            transform: translateY(-8px);
        }
        .portal-card:hover .portal-avatar {
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.15);
        }

        /* 中央揃えフッター */
        footer {
            margin-top: auto; padding: 30px 40px; text-align: center;
            font-size: 0.75rem; color: #64748b; letter-spacing: 0.1em;
        }

        /* スマホ表示対応 */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; margin-bottom: 40px; }
            .portal-grid { gap: 30px; }
            .portal-card { width: 180px; }
            .portal-avatar { width: 120px; height: 120px; }
            .portal-name { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>39rage</h1>
        
        <div class="portal-grid">
            
            <!-- ① Qurage （BGM）-->
            <a href="https://casbgcasbg.booth.pm/" class="portal-card" target="_blank" rel="noopener noreferrer">
                <img src="https://fromtheasia.com/wp-content/uploads/NCG292.jpg" alt="Qurage" class="portal-avatar">
                <div class="portal-name">Qurage</div>
                <div class="portal-desc">BGM制作 / Sound</div>
            </a>

            <!-- ② 39rage （メインポートフォリオへの入り口）-->
            <a href="about.html" class="portal-card">
                <img src="https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png" alt="39rage" class="portal-avatar">
                <div class="portal-name">39rage</div>
                <div class="portal-desc">Portfolio Site</div>
            </a>

            <!-- ③ Sacra （歌ってみた）-->
            <!-- ※現在はworks.htmlに飛びますが、必要に応じて変更可能です -->
            <a href="works.html" class="portal-card">
                <img src="https://fromtheasia.com/wp-content/uploads/NCG144.jpg" alt="Sacra" class="portal-avatar">
                <div class="portal-name">Sacra</div>
                <div class="portal-desc">歌ってみた / Vocal</div>
            </a>

        </div>
    </div>

    <footer>
        © 39rage. Powered by GitHub Pages.
    </footer>

</body>
</html>
