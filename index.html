<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>39rage - Portfolio</title>
    <!-- フォントの読み込み -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 全体のデザイン設定 */
        body {
            margin: 0;
            padding: 0;
            background-color: #e0f2fe; /* 爽やかな水色 */
            color: #0f172a; /* 深みのある紺色 */
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 60px 0;
            text-align: center;
        }

        /* アイコン画像 */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 25px;
            border: 3px solid #0f172a;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.15);
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
            font-weight: 700;
        }

        p.description {
            color: #475569;
            font-size: 0.95rem;
            margin-bottom: 45px;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        /* リンクボタンのエリア */
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: block;
            padding: 16px;
            background-color: #0f172a;
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid #0f172a;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        /* ホバー（タップ）時の動き */
        .link-btn:hover {
            background-color: #ffffff;
            color: #0f172a;
            transform: translateY(-2px);
        }

        .media-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(15, 23, 42, 0.1);
        }

        .footer {
            margin-top: auto;
            padding: 50px 0;
            font-size: 0.75rem;
            color: #64748b;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- プロフィール画像 -->
        <img src="https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png" alt="39rage" class="profile-img">
        
        <!-- 名前（半角小文字） -->
        <h1>39rage</h1>
        
        <!-- 新しい紹介文にアップデート！ -->
        <p class="description">MIX / 動画編集 / デザイン / HP制作とか勉強中</p>

        <!-- 別ページへのボタン -->
        <div class="links">
            <a href="about.html" class="link-btn">ABOUT</a>
            <a href="works.html" class="link-btn">WORKS</a>
            <a href="request.html" class="link-btn">REQUEST</a>
        </div>

        <div class="media-section">
            <!-- 将来の拡張スペース -->
        </div>
    </div>

    <div class="footer">
        © 39rage. Powered by GitHub Pages.
    </div>

</body>
</html>
