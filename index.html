<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>39Rage - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 全体のデザイン設定 */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d; /* 深みのある黒 */
            color: #ffffff;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 60px 0;
            text-align: center;
        }

        /* アイコン画像（教えてもらったURLに差し替え済み） */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%; /* 丸く切り抜き */
            object-fit: cover;
            margin-bottom: 25px;
            border: 3px solid #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 195, 255, 0.2); /* ほんのり青く光らせる */
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
            font-weight: 700;
        }

        p.description {
            color: #a0a0a0;
            font-size: 0.95rem;
            margin-bottom: 45px;
            letter-spacing: 0.05em;
        }

        /* リンクボタンのエリア */
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: block;
            padding: 16px;
            background-color: #161616;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid #333;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        /* ホバー時の動き（iPad/Androidでも反応します） */
        .link-btn:hover {
            background-color: #ffffff;
            color: #000;
            transform: translateY(-2px);
        }

        /* 将来のメディア（動画・音声）セクション */
        .media-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid #222;
        }

        .media-section h3 {
            font-size: 1.1rem;
            color: #444;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .footer {
            margin-top: auto;
            padding: 50px 0;
            font-size: 0.75rem;
            color: #444;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

        <h1>39Rage</h1>
        <p class="description">Creating something special.</p>

        <div class="links">
