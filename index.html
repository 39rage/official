<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>39rage - Portfolio</title>
    <!-- フォントの読み込み -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 全体のデザイン設定 */
        body {
            margin: 0;
            padding: 0;
            background-color: #e0f2fe; /* 爽やかな水色 */
            color: #0f172a; /* 深みのある紺色 */
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 画面上部のヘッダー（メニューを右上に配置） */
        header {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 40px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; /* 右寄せ */
        }

        /* メニューのリンク */
        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-btn {
            color: #0f172a;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.1em;
            position: relative;
            padding-bottom: 4px;
        }

        /* メニューに線を引くお洒落なホバー効果 */
        .nav-btn::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: #0f172a;
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }
        .nav-btn:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        /* メインコンテンツエリア（左右分割のコンテナ） */
        .main-layout {
            flex: 1;
            display: flex;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px 60px 40px;
            box-sizing: border-box;
            gap: 60px;
        }

        /* 左側：テキストエリア */
        .profile-text-side {
            flex: 1;
            text-align: left; /* 左寄せ */
        }

        .profile-text-side h1 {
            font-size: 3rem;
            letter-spacing: 0.1em;
            margin: 0 0 15px 0;
            font-weight: 700;
        }

        .profile-text-side .description {
            color: #475569;
            font-size: 1.05rem;
            margin: 0 0 40px 0;
            letter-spacing: 0.05em;
            font-weight: 500;
            line-height: 1.8;
        }

        /* SNSリンクの並び */
        .sns-links {
            display: flex;
            gap: 20px;
        }

        .sns-link {
            color: #475569;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            transition: color 0.2s;
        }

        .sns-link:hover {
            color: #0f172a;
        }

        /* 右側：画像エリア */
        .profile-image-side {
            flex: 1;
            display: flex;
            justify-content: center; /* 中央寄せ */
        }

        /* ★アイコンを正方形＆範囲内フィットに変更 */
        .profile-img {
            width: 320px;
            height: 320px;
            border-radius: 16px; /* 角をほんのり丸くしてお洒落に */
            object-fit: cover; /* 縦横比を崩さずに範囲いっぱいに広げるおまじない */
            border: 4px solid #0f172a;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.15);
        }

        /* フッター */
        footer {
            padding: 40px;
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            letter-spacing: 0.1em;
        }

        /* 📱 スマホ・タブレット（画面が狭い時）の調整 */
        @media (max-width: 768px) {
            header {
                justify-content: center; /* メニューを中央に */
                padding: 25px 20px;
            }
            .main-layout {
                flex-direction: column-reverse; /* 画像が上、テキストが下に入れ替わります */
                text-align: center;
                padding: 0 20px 40px 20px;
                gap: 40px;
            }
            .profile-text-side {
                text-align: center;
            }
            .profile-text-side h1 {
                font-size: 2.2rem;
            }
            .sns-links {
                justify-content: center;
            }
            /* スマホの時の画像サイズ */
            .profile-img {
                width: 240px;
                height: 240px;
            }
        }
    </style>
</head>
<body>

    <!-- 右上のメニューバー -->
    <header>
        <nav class="nav-links">
            <a href="about.html" class="nav-btn">ABOUT</a>
            <a href="works.html" class="nav-btn">WORKS</a>
            <a href="request.html" class="nav-btn">REQUEST</a>
        </nav>
    </header>

    <!-- メインの左右レイアウト -->
    <main class="main-layout">
        
        <!-- 左側：お名前と説明文、SNS -->
        <div class="profile-text-side">
            <h1>39rage</h1>
            <p class="description">MIX / 動画編集 / デザイン / HP制作とか勉強中</p>
            
            <div class="sns-links">
                <a href="#" class="sns-link" target="_blank">X (Twitter)</a>
                <a href="#" class="sns-link" target="_blank">Instagram</a>
                <a href="#" class="sns-link" target="_blank">YouTube</a>
            </div>
        </div>

        <!-- 右側：正方形のアイコン画像 -->
        <div class="profile-image-side">
            <img src="https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png" alt="39rage" class="profile-img">
        </div>

    </main>

    <!-- フッター -->
    <footer>
        © 39rage. Powered by GitHub Pages.
    </footer>

</body>
</html>
