<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Page</title>
    <link rel="icon" href="https://fromtheasia.com/wp-content/uploads/6410224d7e21cc6e2a9eb0cf659e7eb4.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Qurage: Orange */
            --qurage-main: #ff8c00;
            /* 39rage: Light Blue */
            --sakurage-main: #00d4ff;
            /* Sacra: Lavender/Purple */
            --sacra-main: #9370db;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #000;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* タイトルエリア */
        .title-area {
            text-align: center;
            padding: 80px 20px;
            position: absolute;
            top: 0; left: 0; width: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .title-area h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        .select-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            position: relative;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .panel:last-child { border-right: none; }

        .panel-bg {
            position: absolute;
            inset: 0;
            background-size: cover !important;
            background-position: center !important;
            transition: transform 1.5s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1;
        }

        .panel-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.7s ease;
            z-index: 2;
        }

        .panel:hover { flex: 2; }
        .panel:hover .panel-bg { transform: scale(1.1); }
        .panel:hover .panel-overlay { 
            background: rgba(0, 0, 0, 0.2); 
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
        }

        .panel-content {
            position: relative;
            z-index: 3;
            text-align: center;
            width: 100%;
        }

        /* 修正：大文字強制(uppercase)を解除 */
        .name {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
            /* text-transform: uppercase; を削除 */
        }

        .desc {
            display: inline-block;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            font-weight: 900;
            padding: 6px 18px;
            border-radius: 50px;
            color: #fff;
            text-shadow: 0 1px 5px rgba(0,0,0,0.3);
            transition: all 0.4s ease;
        }

        /* --- 各名義のカラー設定 --- */

        /* 1. Qurage */
        .panel.qurage:hover { box-shadow: inset 0 0 120px rgba(255, 140, 0, 0.3); }
        .panel.qurage .desc { 
            background-color: var(--qurage-main);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.4);
        }

        /* 2. 39rage */
        .panel.sakurage:hover { box-shadow: inset 0 0 120px rgba(0, 212, 255, 0.3); }
        .panel.sakurage .desc { 
            background-color: var(--sakurage-main);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        /* 3. Sacra */
        .panel.sakura:hover { box-shadow: inset 0 0 120px rgba(147, 112, 219, 0.3); }
        .panel.sakura .desc { 
            background-color: var(--sacra-main);
            box-shadow: 0 0 20px rgba(147, 112, 219, 0.3);
        }

        /* 背景画像 */
        .panel.qurage .panel-bg { background: url('https://fromtheasia.com/wp-content/uploads/NCG292.jpg'); }
        .panel.sakurage .panel-bg { background: url('https://64.media.tumblr.com/3798e5568544434743b7bc635c4b539a/tumblr_pd6q45nJAl1xci1k0o1_1280.png'); }
        .panel.sakura .panel-bg { background: url('https://fromtheasia.com/wp-content/uploads/NCG144.jpg'); }

        @media (max-width: 768px) {
            .select-container { flex-direction: column; }
            .panel { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .panel:hover { flex: 1; }
            .title-area { position: relative; padding: 40px 20px; }
            .name { font-size: 2.4rem; }
            .panel-overlay { backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        }
    </style>
</head>
<body>

    <div class="title-area">
        <h1>WHICH PERSONA?</h1>
    </div>

    <div class="select-container">
        
        <!-- Qurage -->
        <a href="qurage/index.html" class="panel qurage" target="_blank" rel="noopener noreferrer">
            <div class="panel-bg"></div>
            <div class="panel-overlay"></div>
            <div class="panel-content">
                <div class="name">Qurage</div>
                <div class="desc">BGM ARCHIVE</div>
            </div>
        </a>

        <!-- 39rage -->
        <a href="39rage/index.html" class="panel sakurage" target="_blank" rel="noopener noreferrer">
            <div class="panel-bg"></div>
            <div class="panel-overlay"></div>
            <div class="panel-content">
                <div class="name">39rage</div>
                <div class="desc">MIX & VIDEO EDIT</div>
            </div>
        </a>

        <!-- Sacra -->
        <a href="https://3939-sacra.carrd.co/" class="panel sakura" target="_blank" rel="noopener noreferrer">
            <div class="panel-bg"></div>
            <div class="panel-overlay"></div>
            <div class="panel-content">
                <div class="name">Sacra</div>
                <div class="desc">VOCALIST</div>
            </div>
        </a>

    </div>

</body>
</html>
